name = "freepieces"
main = "src/worker.ts"
compatibility_date = "2026-04-14"
compatibility_flags = ["nodejs_compat"]

[vars]
# Public URL for building OAuth callback URLs.
# Value is read from .env (gitignored) via wrangler's ${} interpolation.
FREEPIECES_PUBLIC_URL = "https://freepieces.example.workers.dev"

# KV namespace for encrypted per-user OAuth token storage.
# TOKEN_STORE_ID is read from .env (gitignored).
[[kv_namespaces]]
binding = "TOKEN_STORE"
id = "your-kv-namespace-id"

# Static assets – the compiled admin React SPA.
# Build with: npm run build:admin
[assets]
directory = "./dist/public"
binding = "ASSETS"

# Static credentials are stored as Cloudflare Secrets (never in vars):
#   wrangler secret put TOKEN_ENCRYPTION_KEY   # 32 random hex bytes → AES-GCM key material
#
# Gmail OAuth2 credentials:
#   wrangler secret put GMAIL_CLIENT_ID
#   wrangler secret put GMAIL_CLIENT_SECRET
#
# Example OAuth2 piece credentials:
#   wrangler secret put EXAMPLE_OAUTH_CLIENT_ID
#   wrangler secret put EXAMPLE_OAUTH_CLIENT_SECRET
#
# Admin UI credentials (set in .env for local dev, secrets for production):
#   wrangler secret put ADMIN_USER
#   wrangler secret put ADMIN_PASSWORD
#   wrangler secret put ADMIN_SIGNING_KEY      # 32 random hex bytes → openssl rand -hex 32
#
# Runtime API key (recommended):
#   wrangler secret put RUN_API_KEY            # prefix with fp_sk_, e.g. fp_sk_<hex32>
# When set, runtime callers use:
#   Authorization: Bearer <RUN_API_KEY>
#   X-User-Id: <userId>
#   X-Piece-Token: <token>

# ── Queue delivery for subscriptions ──────────────────────────────────────────
# To deliver webhook subscription events to a Cloudflare Queue instead of an
# HTTP callback, add a [[queues.producers]] entry for each target queue.
# Binding naming convention: QUEUE_<UPPER_SNAKE_CASE_OF_QUEUE_NAME>
#
# [[queues.producers]]
# queue = "slack-new-message"
# binding = "QUEUE_SLACK_NEW_MESSAGE"
